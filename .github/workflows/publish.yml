name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '>=24.11.0 <25'
          cache: pnpm
          registry-url: https://registry.npmjs.org/

      - name: Verify version matches release tag
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$TAG_NAME" != "$PKG_VERSION" ]; then
            echo "Tag ($TAG_NAME) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi
          echo "Tag and package.json version match: $TAG_NAME"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm typecheck

      - name: Test
        run: pnpm test -- --run

      - name: Build and verify artifacts
        run: pnpm test:artifacts

      - name: Publish to npm with provenance
        run: pnpm publish --access public --no-git-checks --provenance
